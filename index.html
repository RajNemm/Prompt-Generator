<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PromptCraft — AI Prompt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #7c6bff;
    --accent2: #b06bff;
    --accent3: #6bffd4;
    --text: #f0eeff;
    --muted: #8888aa;
    --muted2: #4a4a6a;
    --card-bg: #0f0f1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(124,107,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,107,255,0.04) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none; z-index: 0;
  }

  .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
  .blob1 { width: 600px; height: 600px; top: -180px; left: -180px;
    background: radial-gradient(circle, rgba(124,107,255,0.13) 0%, transparent 65%); }
  .blob2 { width: 500px; height: 500px; bottom: -150px; right: -150px;
    background: radial-gradient(circle, rgba(107,255,212,0.08) 0%, transparent 65%); }

  .wrapper { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

  .header { text-align: center; margin-bottom: 3rem; animation: fadeUp 0.6s ease both; }
  .logo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(124,107,255,0.1); border: 1px solid rgba(124,107,255,0.25);
    border-radius: 999px; padding: 5px 16px; margin-bottom: 1.5rem;
    font-size: 12px; font-weight: 500; color: #b0a0ff; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .logo-badge span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); display: inline-block; animation: pulse 2s infinite; }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.1; margin-bottom: 1rem; }
  h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .subtitle { font-size: 16px; color: var(--muted); max-width: 480px; margin: 0 auto; line-height: 1.7; }

  .api-section {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem; animation: fadeUp 0.6s 0.1s ease both;
  }
  .api-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.6rem; }
  .api-label a { color: var(--accent3); text-decoration: none; }
  .api-label a:hover { text-decoration: underline; }
  .api-row { display: flex; gap: 10px; }
  .api-row input {
    flex: 1; background: var(--card-bg); border: 1px solid var(--border2); border-radius: 10px;
    padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .api-row input:focus { border-color: var(--accent); }
  .api-row input::placeholder { color: var(--muted2); }
  .save-btn {
    background: rgba(124,107,255,0.15); border: 1px solid rgba(124,107,255,0.3);
    color: #c0b0ff; padding: 10px 18px; border-radius: 10px; cursor: pointer;
    font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; transition: all 0.2s; white-space: nowrap;
  }
  .save-btn:hover { background: rgba(124,107,255,0.25); }
  .api-status { font-size: 12px; margin-top: 8px; min-height: 18px; }
  .api-status.ok { color: var(--accent3); }
  .api-status.err { color: #ff7b7b; }

  .search-section { margin-bottom: 1.5rem; animation: fadeUp 0.6s 0.2s ease both; }
  .search-box {
    display: flex; gap: 10px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; padding: 8px 8px 8px 20px;
    transition: border-color 0.2s;
  }
  .search-box:focus-within { border-color: rgba(124,107,255,0.5); }
  .search-box input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
  }
  .search-box input::placeholder { color: var(--muted2); }
  .gen-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; padding: 12px 24px;
    border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s; white-space: nowrap;
  }
  .gen-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .gen-btn:active { transform: translateY(0); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .quick-picks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2rem; animation: fadeUp 0.6s 0.3s ease both; }
  .quick-label { font-size: 12px; color: var(--muted2); align-self: center; margin-right: 2px; }
  .chip {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 5px 14px; border-radius: 999px;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .chip:hover { background: rgba(124,107,255,0.12); border-color: rgba(124,107,255,0.3); color: var(--text); }

  .status-bar { font-size: 13px; color: var(--muted); margin-bottom: 1.2rem; min-height: 20px; }

  .results-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }

  .prompt-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.3rem 1.5rem;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .prompt-card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .badge { font-size: 11px; font-weight: 600; font-family: 'Syne'; padding: 4px 12px; border-radius: 999px; }

  .prompt-text { font-size: 14.5px; color: #ccc8e8; line-height: 1.75; margin-bottom: 1.1rem; }

  .card-actions { display: flex; gap: 8px; }
  .btn-copy, .btn-use { padding: 6px 14px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <h1>Generate the <em>Perfect Prompt</em></h1>
  </div>

  <!-- UPDATED API SECTION -->
  <div class="api-section">
    <div class="api-label">
      🔑 Paste your OpenRouter API Key ·
      <a href="https://openrouter.ai/" target="_blank">Get key →</a>
    </div>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="sk-or-xxxxxxxx..." />
      <button class="save-btn" onclick="saveKey()">Save Key</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <div class="search-box">
    <input type="text" id="topicInput" placeholder="Enter topic..." />
    <button class="gen-btn" onclick="generate()">Generate</button>
  </div>

  <div id="resultsArea"></div>

</div>

<script>
let API_KEY = localStorage.getItem('openrouter_key') || '';
let currentPrompts = [];

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) { alert("Enter key"); return; }
  API_KEY = val;
  localStorage.setItem('openrouter_key', val);
  document.getElementById('apiStatus').innerText = "Saved ✅";
}

async function generate() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) return alert("Enter topic");

  const prompt = `Return ONLY JSON array of 6 prompts for: ${topic}`;

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json",
        "HTTP-Referer": window.location.origin,
        "X-Title": "PromptCraft"
      },
      body: JSON.stringify({
        model: "openai/gpt-oss-120b:free",
        messages: [{ role: "user", content: prompt }],
        temperature: 0.8
      })
    });

    const data = await res.json();

    const raw = data?.choices?.[0]?.message?.content || "";
    const clean = raw.replace(/```json|```/g, '').trim();

    let prompts;
    try { prompts = JSON.parse(clean); }
    catch { throw new Error("Invalid JSON"); }

    render(prompts);

  } catch (e) {
    document.getElementById("resultsArea").innerHTML =
      `<p style="color:red;">${e.message}</p>`;
  }
}

function render(prompts) {
  const el = document.getElementById("resultsArea");
  el.innerHTML = "";

  prompts.forEach(p => {
    const div = document.createElement("div");
    div.className = "prompt-card";
    div.innerHTML = `<p>${p.prompt}</p>`;
    el.appendChild(div);
  });
}
</script>

</body>
</html>
